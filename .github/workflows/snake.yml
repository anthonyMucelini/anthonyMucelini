name: Generate Snake

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: anthonyMucelini
          outputs: |
            github-contribution-grid-snake.svg

      - uses: actions/upload-artifact@v3
        with:
          name: snake
          path: github-contribution-grid-snake.svg
